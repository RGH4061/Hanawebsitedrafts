<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Us — Hana Microelectronics</title>
  <link rel="stylesheet" href="hana-tokens.css" />
  <link rel="stylesheet" href="forms/contact.css" />
  <style> body { margin: 0; background: var(--bg); } </style>
</head>
<body>
  <div id="root"></div>

  <template id="__bundler_thumbnail">
    <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
      <rect width="1200" height="800" fill="#0E4A7C"></rect>
      <rect x="360" y="250" width="480" height="320" rx="20" fill="#ffffff"></rect>
      <rect x="400" y="300" width="400" height="34" rx="8" fill="#E5EEF5"></rect>
      <rect x="400" y="360" width="400" height="34" rx="8" fill="#E5EEF5"></rect>
      <rect x="400" y="480" width="150" height="44" rx="8" fill="#1283DD"></rect>
      <text x="600" y="160" font-family="Geist, sans-serif" font-size="64" font-weight="700" fill="#ffffff" text-anchor="middle">Contact</text>
    </svg>
  </template>

  <script>
    window.TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "pattern": "pcb",
      "heroTheme": "dark",
      "placement": "none",
      "accent": true,
      "formCol": 500,
      "density": "regular"
    }/*EDITMODE-END*/;
  </script>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="hana-backgrounds.js"></script>
  <script src="site-nav.js"></script>
  <script type="text/babel" src="forms/tweaks-panel.jsx"></script>
  <script type="text/babel" src="forms/chrome.jsx"></script>
  <script type="text/babel" src="forms/forms.jsx"></script>
  <script type="text/babel" src="forms/contact-page.jsx"></script>

  <script type="text/babel">
    function App() {
      const [t, setTweak] = useTweaks(window.TWEAK_DEFAULTS);
      return (
        <React.Fragment>
          <ContactPage
            pattern={t.pattern}
            heroTheme={t.heroTheme}
            placement={t.placement}
            accent={t.accent}
            formCol={t.formCol}
            density={t.density}
          />
          <TweaksPanel>
            <TweakSection label="Background" />
            <TweakSelect label="Pattern" value={t.pattern}
              options={['pcb', 'topo', 'wafer', 'none']}
              onChange={(v) => setTweak('pattern', v)} />
            <TweakRadio label="Hero theme" value={t.heroTheme}
              options={['dark', 'light']}
              onChange={(v) => setTweak('heroTheme', v)} />
            <TweakRadio label="Secondary fill" value={t.placement}
              options={['none', 'page', 'intro']}
              onChange={(v) => setTweak('placement', v)} />
            <TweakToggle label="Cyan accent nodes" value={t.accent}
              onChange={(v) => setTweak('accent', v)} />
            <TweakSection label="Form layout" />
            <TweakSlider label="Form column" value={t.formCol} min={380} max={560} step={10} unit="px"
              onChange={(v) => setTweak('formCol', v)} />
            <TweakRadio label="Density" value={t.density}
              options={['compact', 'regular', 'comfy']}
              onChange={(v) => setTweak('density', v)} />
          </TweaksPanel>
        </React.Fragment>);
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>

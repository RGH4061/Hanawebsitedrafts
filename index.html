<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hana — Homepage V1A (Working Draft)</title>
  <link rel="stylesheet" href="hana-tokens.css" />
  <style>
    body { margin: 0; font-family: var(--font-text, 'Inter', 'Segoe UI', Arial, sans-serif); background: #fff; }
    .wf-badge {
      position: fixed; top: 12px; right: 16px; z-index: 9999;
      background: #FFDE59; color: #333; font-size: 11px; font-weight: 700;
      padding: 4px 10px; border-radius: 20px; letter-spacing: .5px;
      text-transform: uppercase; box-shadow: 0 2px 6px rgba(0,0,0,.15);
    }
  </style>
</head>
<body>
  
  <div id="root"></div>

  <template id="__bundler_thumbnail">
    <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
      <rect width="1200" height="800" fill="#030A17"></rect>
      <g stroke="#1283DD" stroke-width="4" fill="none" opacity="0.65">
        <path d="M360 400h150v-150h180v300h150"></path>
        <circle cx="360" cy="400" r="9" fill="#1283DD"></circle>
        <circle cx="840" cy="550" r="9" fill="#1283DD"></circle>
      </g>
      <text x="600" y="445" font-family="Geist, system-ui, sans-serif" font-size="340" font-weight="700" fill="#ffffff" text-anchor="middle">H</text>
    </svg>
  </template>

  <script>
    window.TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "mood": "daylight",
      "density": "standard",
      "hero": "photo"
    }/*EDITMODE-END*/;
  </script>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="hana-backgrounds.js"></script>

  <script src="site-nav.js"></script>
  <script type="text/babel" src="homepage-wireframes/tweaks-panel.jsx"></script>
  <script type="text/babel" src="homepage-wireframes/shared.jsx"></script>
  <script type="text/babel" src="homepage-wireframes/capabilities-icons.jsx"></script>
  <script type="text/babel" src="homepage-wireframes/v1b-circuit.jsx"></script>

  <script type="text/babel">
    const { useEffect } = React;
    function App() {
      useEffect(() => { injectHanaStyles(); }, []);
      return <HomepageV1bCircuit rightPanel="video-stats" middle="light" />;
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</html>

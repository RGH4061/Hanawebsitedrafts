<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hana — Locations</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="hana-tokens.css" />
  <style>
    html, body { margin: 0; padding: 0; }
    body { font-family: var(--font-text); background: #fff; -webkit-font-smoothing: antialiased; }
    * { box-sizing: border-box; }
  </style>
</head>
<body>
  <div id="root"></div>

  <template id="__bundler_thumbnail">
    <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
      <rect width="1200" height="800" fill="#0E4A7C"></rect>
      <g fill="#7EC8FF" opacity="0.55">
        <circle cx="360" cy="300" r="9"></circle><circle cx="410" cy="280" r="9"></circle><circle cx="450" cy="320" r="9"></circle>
        <circle cx="700" cy="360" r="9"></circle><circle cx="760" cy="330" r="9"></circle><circle cx="800" cy="380" r="9"></circle>
      </g>
      <circle cx="430" cy="300" r="20" fill="#1283DD" stroke="#fff" stroke-width="6"></circle>
      <circle cx="770" cy="350" r="20" fill="#1283DD" stroke="#fff" stroke-width="6"></circle>
      <text x="600" y="560" font-family="Geist, sans-serif" font-size="64" font-weight="700" fill="#fff" text-anchor="middle">Locations</text>
    </svg>
  </template>

  <script>
    window.TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "accent": "#0E4A7C",
      "density": "compact"
    }/*EDITMODE-END*/;
  </script>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="hana-backgrounds.js"></script>
  <script src="site-nav.js"></script>
  <script type="text/babel" src="subcap-template/chrome.jsx"></script>
  <script type="text/babel" src="locations/tweaks-panel.jsx"></script>
  <script type="text/babel" src="locations/data.jsx"></script>
  <script type="text/babel" src="locations/chrome.jsx"></script>
  <script type="text/babel" src="locations/map.jsx"></script>
  <script type="text/babel" src="locations/hub.jsx"></script>

  <script type="text/babel">
    function App() {
      const [t, setTweak] = useTweaks(window.TWEAK_DEFAULTS);
      return (
        <React.Fragment>
          <LocationsHub accent={t.accent} density={t.density} />
          <TweaksPanel>
            <TweakSection label="Brand" />
            <TweakColor label="Accent" value={t.accent}
              options={['#1283DD', '#0E4A7C', '#0E9E8A']}
              onChange={(v) => setTweak('accent', v)} />
            <TweakSection label="Layout" />
            <TweakRadio label="Density" value={t.density}
              options={['comfortable', 'compact']}
              onChange={(v) => setTweak('density', v)} />
          </TweaksPanel>
        </React.Fragment>);
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>

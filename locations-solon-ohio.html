<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hana — Ohio plant</title>
  <link rel="stylesheet" href="hana-tokens.css" />
  <meta name="ext-resource-dependency" content="partners/impinj-nxp.png" data-resource-id="partners/impinj-nxp.png" />
  <meta name="ext-resource-dependency" content="partners/arc-quality.png" data-resource-id="partners/arc-quality.png" />
  <style>
    html, body { margin: 0; padding: 0; }
    body { font-family: var(--font-text); background: #fff; -webkit-font-smoothing: antialiased; }
    * { box-sizing: border-box; }
  </style>
</head>
<body>
  <div id="root"></div>

  <template id="__bundler_thumbnail" data-bg-color="#0E4A7C">
    <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
      <rect width="1200" height="800" fill="#0E4A7C"></rect>
      <rect x="0" y="0" width="1200" height="430" fill="#0B3A62"></rect>
      <circle cx="150" cy="360" r="22" fill="#1283DD" stroke="#fff" stroke-width="6"></circle>
      <text x="150" y="320" font-family="Geist, sans-serif" font-size="90" font-weight="700" fill="#ffffff">Ohio</text>
      <g fill="#1283DD"><rect x="150" y="520" width="240" height="120" rx="8"></rect><rect x="420" y="520" width="240" height="120" rx="8" fill="none" stroke="#1283DD" stroke-width="4"></rect></g>
    </svg>
  </template>

  <script>
    window.TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "accent": "#0E4A7C",
      "density": "compact",
      "heroStyle": "veil"
    }/*EDITMODE-END*/;
  </script>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="hana-backgrounds.js"></script>
  <script src="site-nav.js"></script>
  <script type="text/babel" src="subcap-template/chrome.jsx"></script>
  <script type="text/babel" src="locations/tweaks-panel.jsx"></script>
  <script type="text/babel" src="locations/detail-ohio.jsx"></script>
  <script type="text/babel" src="locations/chrome.jsx"></script>
  <script type="text/babel" src="locations/plant.jsx"></script>

  <script type="text/babel">
    function App() {
      const [t, setTweak] = useTweaks(window.TWEAK_DEFAULTS);
      return (
        <React.Fragment>
          <PlantPage accent={t.accent} density={t.density} heroStyle={t.heroStyle} />
          <TweaksPanel>
            <TweakSection label="Brand" />
            <TweakColor label="Accent" value={t.accent}
              options={['#1283DD', '#0E4A7C', '#0E9E8A']}
              onChange={(v) => setTweak('accent', v)} />
            <TweakSection label="Hero" />
            <TweakRadio label="Style" value={t.heroStyle}
              options={['veil', 'image', 'split', 'texture']}
              onChange={(v) => setTweak('heroStyle', v)} />
            <TweakSection label="Layout" />
            <TweakRadio label="Density" value={t.density}
              options={['comfortable', 'compact']}
              onChange={(v) => setTweak('density', v)} />
          </TweaksPanel>
        </React.Fragment>);
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
